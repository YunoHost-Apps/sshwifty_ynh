#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.1-beta-release-prebuild/sshwifty_0.4.1-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "b1cd672ed3a37a834c623c64ef669c3417e8cf7d94d95a89bef5d5107e9889b7"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.1-beta-release-prebuild/sshwifty_0.4.1-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "d28f13bf5d3692218ac500da43ff9de29b779c006cd86b893ed55d3a57d27128"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.1-beta-release-prebuild/sshwifty_0.4.1-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "4386eaa1641020af6b6f29d04b061b318a9d5ebb0723668b73c5552be95b04b3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
