#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.5~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.5-beta-release-prebuild/sshwifty_0.4.5-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "3deff9a59850c4e7c3ecc45f80e22a97d1bd479d5038b8696d1befe0b39f1633"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.5-beta-release-prebuild/sshwifty_0.4.5-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "96a02c4dd314d7b064573f32fc09290a64090b8ef2323bb13f8d6e25b2075a01"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.5-beta-release-prebuild/sshwifty_0.4.5-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "1af53db23e8babbd88c279a82594b939d06881fef49cc47c1f567ee4c629e7be"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
