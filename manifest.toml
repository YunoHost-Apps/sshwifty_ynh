#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.0-beta-release-prebuild/sshwifty_0.4.0-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "502e0bdba83a1b274a00261b6acfc6325fd4504ec07ef61765ca2e63cf1b74d4"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.0-beta-release-prebuild/sshwifty_0.4.0-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "1f5258bce06251344ec45fdc2f5c08c8753b5e6316e7b9668655ae42a6727f27"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.0-beta-release-prebuild/sshwifty_0.4.0-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "36750733607d13ea9132a5e3cb5dda8ef2178906aad4d34cb2b884e14cc00e18"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
