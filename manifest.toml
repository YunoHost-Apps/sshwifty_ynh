#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.3-beta-release-prebuild/sshwifty_0.4.3-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "589d386ec9d95996d5d111ab4808b60f613b93eab399e6ee32ee868118055ed8"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.3-beta-release-prebuild/sshwifty_0.4.3-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "149115f95e9c03a3d8e9055ebd661f4c5cb1b1558ba70398b94c8d2a56d98d37"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.3-beta-release-prebuild/sshwifty_0.4.3-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "814843f22de57cc2ab081bf6d02e33638bb6e8887735b0e9551ebff960a169e9"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
