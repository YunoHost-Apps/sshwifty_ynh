#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.6~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.6-beta-release-prebuild/sshwifty_0.4.6-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "82fd39521309adf0c45644e1533606e373f3f00bcdcc18b5b2dcc2bedb7b3802"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.6-beta-release-prebuild/sshwifty_0.4.6-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "594ed3a1accac9243cba9c65fa55f530f0f3dcfbcbe58a6eb62208406ed58442"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.6-beta-release-prebuild/sshwifty_0.4.6-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "274773c20ecae0ec9f19be897e8b1b8e759e39b242cfba5c5bfe3699cf875014"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
