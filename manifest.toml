#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sshwifty"
name = "Sshwifty"
description.en = "Web SSH & Telnet (WebSSH & WebTelnet client)"
description.fr = "Web SSH et Telnet (client Web SSH et Web Telnet)"

version = "0.4.4~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
demo = "https://sshwifty-demo.nirui.org/"
code = "https://github.com/nirui/sshwifty"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.4-beta-release-prebuild/sshwifty_0.4.4-beta-release_linux_amd64.tar.gz"
    amd64.sha256 = "4ba2ed062d615220ee5199bfcc16f1ac76f41db34fd5154137edb6097029d8af"
    arm64.url = "https://github.com/nirui/sshwifty/releases/download/0.4.4-beta-release-prebuild/sshwifty_0.4.4-beta-release_linux_arm64.tar.gz"
    arm64.sha256 = "31d13515bd8bb8fc2150d2a0342b1404873c4911aebdbf3d6e4a0087aed9332f"
    armhf.url = "https://github.com/nirui/sshwifty/releases/download/0.4.4-beta-release-prebuild/sshwifty_0.4.4-beta-release_linux_arm.tar.gz"
    armhf.sha256 = "d55612ba3ab7dd41943b27676c2ae0dd813cb7a972631431be5be83d58f7e226"

    autoupdate.strategy = "latest_github_release"
    autoupdate.version_regex = "^(.*)-beta-release-prebuild$"
    autoupdate.asset.amd64 = "sshwifty_.*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "sshwifty_.*_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "sshwifty_.*_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
